name: Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        type: choice
        options: [dev, prod]
        required: true
      promote_image_tag:
        description: '(prod only) Dev image tag to promote, e.g. dev-abc1234. Empty = build fresh.'
        required: false

permissions:
  contents: read
  security-events: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AWS_REGION: us-east-1
  DEV_ECR: srikanth-portfolio-dev
  PROD_ECR: srikanth-portfolio-prod
  DEV_LAMBDA: srikanth-portfolio-dev
  PROD_LAMBDA: srikanth-portfolio-prod

jobs:
  # ─── 1 ────────────────────────────────────────────────────────────────────
  build-test-scan:
    name: 1. Build • Test • Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: Build
        run: npm run build
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      - name: Validate Dockerfile (PR only — build, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: srikanth-portfolio:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # ─── 2 ────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: 2. Docker Build & Push (ECR)
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.event_name != 'pull_request'
    timeout-minutes: 20
    outputs:
      target: ${{ steps.meta.outputs.target }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_repo: ${{ steps.meta.outputs.ecr_repo }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        name: Resolve target, ECR repo, and image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TARGET=prod; ECR="$PROD_ECR"; TAG="prod-${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == workflow_dispatch && "${{ inputs.target }}" == prod ]]; then
            TARGET=prod; ECR="$PROD_ECR"
            if [[ -n "${{ inputs.promote_image_tag }}" ]]; then
              TAG="prod-promoted-${{ inputs.promote_image_tag }}"
            else
              TAG="prod-${SHORT_SHA}"
            fi
          else
            TARGET=dev; ECR="$DEV_ECR"; TAG="dev-${SHORT_SHA}"
          fi
          echo "target=$TARGET"     >> "$GITHUB_OUTPUT"
          echo "ecr_repo=$ECR"      >> "$GITHUB_OUTPUT"
          echo "image_tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "Resolved → target=$TARGET ecr=$ECR tag=$TAG"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        run: |
          ECR="${{ steps.meta.outputs.ecr_repo }}"
          aws ecr describe-repositories --repository-names "$ECR" \
            --region "$AWS_REGION" 2>/dev/null || \
          aws ecr create-repository \
            --repository-name "$ECR" \
            --region "$AWS_REGION" \
            --encryption-configuration encryptionType=AES256 \
            --image-scanning-configuration "scanOnPush=true"

      - name: Promote dev image → prod ECR (no rebuild)
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'prod' && inputs.promote_image_tag != ''
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SOURCE="${REGISTRY}/${DEV_ECR}:${{ inputs.promote_image_tag }}"
          TARGET="${REGISTRY}/${PROD_ECR}:${{ steps.meta.outputs.image_tag }}"
          docker pull "$SOURCE"
          docker tag "$SOURCE" "$TARGET"
          docker push "$TARGET"
          docker tag "$SOURCE" "${REGISTRY}/${PROD_ECR}:prod-latest"
          docker push "${REGISTRY}/${PROD_ECR}:prod-latest"

      - uses: actions/setup-node@v4
        if: github.event_name != 'workflow_dispatch' || inputs.promote_image_tag == ''
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install + build (fresh-build path)
        if: github.event_name != 'workflow_dispatch' || inputs.promote_image_tag == ''
        run: |
          npm ci
          npm run build
      - uses: docker/setup-buildx-action@v3
        if: github.event_name != 'workflow_dispatch' || inputs.promote_image_tag == ''
      - name: Build & push image
        if: github.event_name != 'workflow_dispatch' || inputs.promote_image_tag == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.meta.outputs.ecr_repo }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.meta.outputs.ecr_repo }}:${{ steps.meta.outputs.target }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # ─── 3 ────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: 3. Deploy → Lambda (dev)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: needs.docker-build-push.outputs.target == 'dev'
    timeout-minutes: 10
    environment: dev
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Update Lambda image
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${DEV_ECR}:${{ needs.docker-build-push.outputs.image_tag }}"
          aws lambda update-function-code \
            --function-name "$DEV_LAMBDA" \
            --image-uri "$IMAGE_URI" \
            --architectures x86_64
      - name: Wait for update
        run: aws lambda wait function-updated --function-name "$DEV_LAMBDA"
      - name: Smoke test
        run: |
          API_URL=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${DEV_LAMBDA}'].ApiEndpoint | [0]" \
            --output text)
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/api/health" || echo "000")
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          exit 1

  # ─── 4 ────────────────────────────────────────────────────────────────────
  functional-tests-dev:
    name: 4. Functional Tests (dev)
    runs-on: ubuntu-latest
    needs: deploy-dev
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: api-url
        run: |
          URL=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${DEV_LAMBDA}'].ApiEndpoint | [0]" \
            --output text)
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
      - run: bash scripts/test-dev.sh --url "${{ steps.api-url.outputs.url }}"

  # ─── 5 ────────────────────────────────────────────────────────────────────
  e2e-tests-dev:
    name: 5. E2E Tests (dev)
    runs-on: ubuntu-latest
    needs: deploy-dev
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: api-url
        run: |
          URL=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${DEV_LAMBDA}'].ApiEndpoint | [0]" \
            --output text)
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
      - env:
          BASE_URL: ${{ steps.api-url.outputs.url }}
        run: npx playwright test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dev
          path: playwright-report/
          retention-days: 7

  # ─── 6 ────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: 6. Deploy → Lambda (prod)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: needs.docker-build-push.outputs.target == 'prod'
    timeout-minutes: 15
    environment: prod
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Update Lambda image
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${PROD_ECR}:${{ needs.docker-build-push.outputs.image_tag }}"
          aws lambda update-function-code \
            --function-name "$PROD_LAMBDA" \
            --image-uri "$IMAGE_URI" \
            --architectures x86_64
      - name: Wait for update
        run: aws lambda wait function-updated --function-name "$PROD_LAMBDA"
      - name: Smoke test
        run: |
          API_URL=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${PROD_LAMBDA}'].ApiEndpoint | [0]" \
            --output text)
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/api/health" || echo "000")
            [ "$STATUS" = "200" ] && exit 0
            sleep 15
          done
          exit 1

  # ─── 7 ────────────────────────────────────────────────────────────────────
  functional-tests-prod:
    name: 7. Functional Tests (prod)
    runs-on: ubuntu-latest
    needs: deploy-prod
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: api-url
        run: |
          URL=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${PROD_LAMBDA}'].ApiEndpoint | [0]" \
            --output text)
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
      - run: bash scripts/test-dev.sh --url "${{ steps.api-url.outputs.url }}"

  # ─── 8 ────────────────────────────────────────────────────────────────────
  e2e-tests-prod:
    name: 8. E2E Tests (prod)
    runs-on: ubuntu-latest
    needs: deploy-prod
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: api-url
        run: |
          URL=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${PROD_LAMBDA}'].ApiEndpoint | [0]" \
            --output text)
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
      - env:
          BASE_URL: ${{ steps.api-url.outputs.url }}
        run: npx playwright test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: playwright-report/
          retention-days: 30
